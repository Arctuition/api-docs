# Build gate for the Starlight docs. The build validates all internal links
# and heading anchors via the starlight-links-validator plugin (see
# astro.config.mjs), so a green build means links are valid too.
name: "Docs CI (build + link validation)"

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build docs (also validates internal links & anchors)
        run: pnpm install --frozen-lockfile && pnpm build
