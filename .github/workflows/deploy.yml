name: Deploy on Master (legacy Slate — retired)

# RETIRED: the live docs are now built from website/ by
# .github/workflows/deploy-modern-docs.yml (Starlight).
# This Slate deploy is kept as a manual-only rollback fallback and no longer
# runs automatically on push. To roll back to the old Slate site, trigger this
# workflow manually from the Actions tab.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Run make deploy
        run: REMOTE=origin make deploy
